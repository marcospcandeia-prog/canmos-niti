version: "3.9"

# Docker Compose para PRODUÇÃO
# Uso: docker compose -f docker-compose.prod.yml up -d

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - canmos-net
    restart: always

  frontend:
    image: canmos-niti-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${APP_URL}
    networks:
      - canmos-net
    restart: always

  backend:
    image: canmos-niti-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env.prod
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - canmos-net
    restart: always

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - canmos-net
    restart: always

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_prod:/data
    networks:
      - canmos-net
    restart: always

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_prod:/qdrant/storage
    networks:
      - canmos-net
    restart: always

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_prod:/root/.ollama
    networks:
      - canmos-net
    restart: always

volumes:
  postgres_prod:
  minio_prod:
  qdrant_prod:
  ollama_prod:

networks:
  canmos-net:
    driver: bridge
