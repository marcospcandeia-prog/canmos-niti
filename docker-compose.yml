version: "3.9"

services:
  # ─── Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    depends_on:
      - backend
    networks:
      - canmos-net
    restart: unless-stopped

  # ─── Backend ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://canmos:canmos_secret@postgres:5432/canmos_niti
      - MINIO_ENDPOINT=minio:9000
      - QDRANT_HOST=qdrant
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - canmos-net
    restart: unless-stopped

  # ─── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: canmos
      POSTGRES_PASSWORD: canmos_secret
      POSTGRES_DB: canmos_niti
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U canmos -d canmos_niti"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - canmos-net
    restart: unless-stopped

  # ─── MinIO (Storage) ──────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: canmos_admin
      MINIO_ROOT_PASSWORD: canmos_secret_storage
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - canmos-net
    restart: unless-stopped

  # ─── Qdrant (Vector DB) ───────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - canmos-net
    restart: unless-stopped

  # ─── Ollama (IA Local) ────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - canmos-net
    restart: unless-stopped
    # Para GPU: descomentar abaixo
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ─── OCR Service ──────────────────────────────────────────
  ocr-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.ocr
    ports:
      - "8001:8001"
    networks:
      - canmos-net
    restart: unless-stopped

# ─── Volumes ──────────────────────────────────────────────────
volumes:
  postgres_data:
  minio_data:
  qdrant_data:
  ollama_data:

# ─── Networks ─────────────────────────────────────────────────
networks:
  canmos-net:
    driver: bridge
