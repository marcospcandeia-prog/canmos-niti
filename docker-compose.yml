version: '3.8'

services:
  # Backend FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: ../infra/docker/Dockerfile.backend
    container_name: canmos-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE=${SUPABASE_SERVICE_ROLE}
      - JWT_SECRET=${JWT_SECRET}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - OLLAMA_HOST=http://ollama:11434
      - QDRANT_HOST=http://qdrant:6333
      - OCR_API_HOST=http://ocr-service:8001
    volumes:
      - ./backend:/app
    depends_on:
      - minio
      - qdrant
      - ollama
    networks:
      - canmos-network
    restart: unless-stopped

  # Frontend Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: ../infra/docker/Dockerfile.frontend
    container_name: canmos-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - canmos-network
    restart: unless-stopped

  # MinIO Storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: canmos-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    volumes:
      - ./storage/minio:/data
    command: server /data --console-address ":9001"
    networks:
      - canmos-network
    restart: unless-stopped

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: canmos-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./storage/qdrant:/qdrant/storage
    networks:
      - canmos-network
    restart: unless-stopped

  # Ollama Local AI
  ollama:
    image: ollama/ollama:latest
    container_name: canmos-ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-phi3:mini}
    volumes:
      - ./storage/ollama:/root/.ollama
      - ./infra/docker/entrypoint-ollama.sh:/entrypoint.sh
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    networks:
      - canmos-network
    restart: unless-stopped
    # GPU support (enable if using nvidia-docker):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # OCR Service Worker
  ocr-service:
    build:
      context: ./backend
      dockerfile: ../infra/docker/Dockerfile.ocr
    container_name: canmos-ocr
    profiles:
      - ocr
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - OCR_POLL_INTERVAL=10
    volumes:
      - ./backend:/app
    depends_on:
      - minio
    networks:
      - canmos-network
    restart: unless-stopped
    # GPU support (enable if using nvidia-docker):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

networks:
  canmos-network:
    driver: bridge
